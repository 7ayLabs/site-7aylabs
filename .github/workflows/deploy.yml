name: Deploy

on:
  push:
    branches: [main, testing]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Docker image tag
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=imzzaidd/site-7aylabs:latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "testing" ]; then
            echo "tag=imzzaidd/site-7aylabs:staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-jenkins:
    name: Trigger Jenkins Deploy
    needs: build-and-push
    if: github.ref_name == 'testing'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins pipeline
        run: |
          CRUMB=$(curl -sf -u "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json" | jq -r '.crumb')
          curl -sf -X POST \
            -u "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            -H "Jenkins-Crumb: $CRUMB" \
            "${{ secrets.JENKINS_URL }}/job/7ayLabsPipeline/job/testing/build"
