name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Claude reviews PRs and posts comments (non-blocking, like GitHub Copilot)
  claude-review:
    if: |
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-blocking: failure does NOT block PR merge
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            You are a code review bot for 7ayLabs. Review this PR and post your feedback as GitHub comments.

            Context: Next.js 15 App Router, React 19, TypeScript, Tailwind CSS, Framer Motion.
            Check CLAUDE.md in the repo root for project-specific guidelines.

            Focus on:
            - Security issues (hardcoded secrets, XSS, injection)
            - Bugs and logic errors
            - TypeScript type safety
            - React/Next.js best practices
            - Performance considerations

            Post a summary comment using `gh pr comment`.
            Use inline comments for specific code issues.
            Be concise and actionable. Only flag real issues, not style preferences.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  # Respond to @claude mentions in PR comments
  claude-respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Respond
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
