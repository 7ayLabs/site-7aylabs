limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;

upstream site_7aylabs_upstream {
    server site-7aylabs-test:8082;
    keepalive 64;
}

# Shared security headers — included in every location block
# (Nginx add_header in a child block replaces ALL parent add_header directives)
map $uri $security_headers {
    default 1;
}

server {
  listen 80;
  server_name test.7aylabs.com;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self';" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Rate limit API endpoints
  location /api/ {
    limit_req zone=api burst=5 nodelay;
    limit_req_status 429;

    proxy_pass http://site_7aylabs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static assets with caching
  location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?)$ {
    proxy_pass http://site_7aylabs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    expires 4h;
    add_header Cache-Control "public, max-age=14400" always;
    # Repeat security headers (Nginx drops parent headers when child uses add_header)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    types {
      image/svg+xml svg;
    }
  }

  location / {
    proxy_pass http://site_7aylabs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    return 200 "ok";
    add_header Content-Type text/plain;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html { root /usr/share/nginx/html; }
}

# Reject requests with wrong Host header
server {
  listen 80 default_server;
  server_name _;
  return 444;
}
